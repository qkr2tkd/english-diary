<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English — 오늘의 영어 일기</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410; --paper: #faf7f2; --paper-warm: #f5f0e8; --cream: #ede8df;
    --accent: #c8602a; --accent-light: #e8936a; --sage: #6b8f71; --blue: #4a7ab5;
    --muted: #9a8f84; --line: #e0d9cf; --shadow: rgba(26,20,16,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 31px, var(--line) 31px, var(--line) 32px); opacity: 0.4; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

  /* HEADER */
  .header { padding: 36px 0 24px; border-bottom: 2px solid var(--ink); margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; }
  .header-left h1 { font-family: 'Lora', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.1; }
  .header-left .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .streak-badge { display: flex; align-items: center; gap: 6px; background: var(--ink); color: var(--paper); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; }

  /* REVIEW BANNER */
  .review-banner { background: var(--ink); color: var(--paper); border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; cursor: pointer; transition: opacity 0.15s; position: relative; }
  .review-banner:hover { opacity: 0.9; }
  .review-banner-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-light); font-weight: 500; margin-bottom: 6px; }
  .review-banner-text { font-family: 'Lora', serif; font-size: 15px; font-style: italic; line-height: 1.55; }
  .review-banner-hint { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 8px; }
  .review-banner-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 18px; line-height: 1; }
  .review-banner-close:hover { color: white; }

  /* DATE NAV */
  .date-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .date-display { font-family: 'Lora', serif; font-size: 18px; font-style: italic; flex: 1; text-align: center; }
  .nav-btn { background: none; border: 1.5px solid var(--line); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--muted); transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--ink); color: var(--ink); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1.5px solid var(--line); margin-bottom: 28px; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* PROMPT */
  .prompt-card { background: var(--paper-warm); border: 1.5px solid var(--line); border-left: 4px solid var(--sage); border-radius: 8px; padding: 16px 18px; margin-bottom: 20px; }
  .prompt-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 6px; }
  .prompt-text { font-family: 'Lora', serif; font-size: 15px; font-style: italic; line-height: 1.5; }
  .prompt-refresh { background: none; border: none; font-size: 11px; color: var(--muted); cursor: pointer; padding: 4px 0 0; display: block; text-decoration: underline; font-family: 'DM Sans', sans-serif; }

  /* WRITE */
  .write-section { background: white; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px var(--shadow); margin-bottom: 20px; }
  .write-label { padding: 14px 20px 0; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .write-area { width: 100%; border: none; outline: none; padding: 12px 20px 20px; font-family: 'Lora', serif; font-size: 17px; line-height: 1.75; color: var(--ink); resize: none; background: transparent; min-height: 120px; }
  .write-area::placeholder { color: #c5bdb5; font-style: italic; }
  .write-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--line); background: var(--paper-warm); }
  .char-count { font-size: 12px; color: var(--muted); }
  .toolbar-right { display: flex; gap: 8px; align-items: center; }
  .mic-btn { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--line); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: all 0.15s; }
  .mic-btn:hover { border-color: var(--accent); }
  .mic-btn.recording { background: #fee; border-color: #e44; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,60,60,0.3);} 50%{box-shadow:0 0 0 8px rgba(220,60,60,0);} }
  .submit-btn { padding: 10px 22px; background: var(--accent); color: white; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .submit-btn:hover { background: #b5551f; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ENTRY BLOCKS */
  .today-entries { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
  .entry-block { background: white; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px var(--shadow); animation: slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  .entry-block-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: var(--paper-warm); border-bottom: 1px solid var(--line); }
  .entry-index { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .entry-header-right { display: flex; align-items: center; gap: 8px; }
  .entry-score-mini { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); font-weight: 500; }
  .mini-dots { display: flex; gap: 3px; }
  .mini-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); }
  .mini-dot.filled { background: var(--accent-light); }
  .entry-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
  .entry-delete:hover { color: #e44; background: #fee5e5; }
  .entry-body { padding: 16px 18px; }
  .entry-original { font-family: 'Lora', serif; font-size: 15px; color: var(--muted); font-style: italic; margin-bottom: 10px; line-height: 1.65; }
  .entry-natural { font-family: 'Lora', serif; font-size: 16px; color: var(--ink); font-weight: 600; line-height: 1.65; margin-bottom: 14px; }
  .entry-keyphrases { border-top: 1px solid var(--line); padding-top: 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .key-phrase-item { background: var(--paper); border-radius: 10px; padding: 12px 14px; }
  .key-phrase-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
  .key-phrase-word { font-weight: 700; font-size: 15px; color: var(--ink); font-family: 'Lora', serif; }
  .key-phrase-meaning { font-size: 13px; color: var(--muted); }
  .key-phrase-why { font-size: 13px; color: var(--ink); line-height: 1.6; margin-bottom: 6px; padding-left: 2px; }
  .key-phrase-example { font-size: 13px; font-style: italic; color: var(--sage); padding: 6px 10px; background: var(--cream); border-radius: 6px; line-height: 1.55; }
  .entry-practice-zone { background: var(--cream); border: 1.5px dashed var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .entry-practice-label { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.3px; }
  .entry-encouragement { margin-top: 12px; padding: 10px 14px; background: var(--paper-warm); border-radius: 8px; font-size: 13px; line-height: 1.55; }
  .entry-counselor { margin-top: 10px; padding: 12px 14px; background: #f0eaf8; border-left: 3px solid #9b7ec8; border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.65; color: #4a3060; }
  .settings-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; opacity: 0.6; transition: opacity 0.2s; }
  .settings-btn:hover { opacity: 1; }
  .settings-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 4px 0; }
  .settings-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .settings-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; margin-top: 2px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ddd; border-radius: 24px; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--sage); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  .tip-explanation { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; line-height: 1.5; margin-bottom: 2px; }
  /* FILL-IN-THE-BLANK */
  .fitb-block { background: var(--paper-warm); border: 1.5px solid var(--line); border-radius: 8px; padding: 12px 14px; }
  .fitb-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .fitb-sentence { font-family: 'Lora', serif; font-size: 15px; line-height: 1.7; color: var(--ink); margin-bottom: 10px; }
  .fitb-blank {
    display: inline-block;
    border-bottom: 2px solid var(--accent);
    min-width: 80px;
    padding: 0 4px;
    margin: 0 2px;
    position: relative;
  }
  .fitb-input {
    border: none; outline: none; background: transparent;
    font-family: 'Lora', serif; font-size: 15px; color: var(--blue);
    font-weight: 600; width: 100%; min-width: 60px;
    padding: 0; line-height: 1.4;
  }
  .fitb-input.correct { color: var(--sage); }
  .fitb-input.wrong { color: #e44; }
  .fitb-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .fitb-check-btn { padding: 5px 14px; background: var(--blue); color: white; border: none; border-radius: 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .fitb-check-btn:hover { background: #3a6a9e; }
  .fitb-feedback { font-size: 12px; margin-top: 6px; padding: 6px 10px; border-radius: 6px; display: none; }
  .fitb-feedback.show { display: block; }
  .fitb-feedback.good { background: #edf7ef; color: #2a6b35; }
  .fitb-feedback.bad { background: #fff4ec; color: #8a4010; }

  /* LOADING */
  .loading { display: flex; flex-direction: column; align-items: center; padding: 32px; gap: 14px; background: white; border: 1.5px solid var(--line); border-radius: 12px; margin-bottom: 16px; }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-light); animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2){animation-delay:0.15s;} .loading-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5;} 40%{transform:scale(1.1);opacity:1;}}
  .loading-text { font-size: 13px; color: var(--muted); font-style: italic; }

  /* EXPRESSIONS TAB */
  .expr-header { margin-bottom: 20px; }
  .expr-level-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--ink); color: var(--paper); padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 500; margin-bottom: 8px; }
  .expr-subtitle { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .expr-generate-btn { margin-top: 12px; padding: 10px 22px; background: var(--accent); color: white; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .expr-generate-btn:hover { background: #b5551f; }
  .expr-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .expr-card { background: white; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 1px 8px var(--shadow); animation: slideIn 0.25s ease; }
  .expr-card-header { padding: 11px 16px; background: var(--paper-warm); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .expr-source-badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; padding: 3px 9px; border-radius: 10px; }
  .expr-source-badge.news { background: #e8f0fb; color: var(--blue); }
  .expr-source-badge.topic { background: #edf7ef; color: var(--sage); }
  .expr-level-tag { font-size: 11px; color: var(--muted); }
  .expr-body { padding: 16px 18px; }
  .expr-phrase { font-family: 'Lora', serif; font-size: 19px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .expr-meaning { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .expr-example { font-family: 'Lora', serif; font-size: 15px; font-style: italic; color: var(--ink); line-height: 1.65; padding: 10px 14px; background: var(--paper-warm); border-radius: 8px; margin-bottom: 14px; }
  .expr-context { font-size: 13px; color: var(--ink); line-height: 1.7; margin-top: 10px; margin-bottom: 4px; padding: 12px 14px; background: var(--paper); border-left: 3px solid var(--sage); border-radius: 0 8px 8px 0; }
  .expr-practice-zone { background: var(--cream); border: 1.5px dashed var(--line); border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
  .expr-practice-zone-label { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.3px; }
  .expr-divider { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
  .expr-practice-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
  .expr-footer { display: flex; gap: 8px; align-items: center; justify-content: flex-end; margin-top: 12px; }
  .expr-known-btn { padding: 6px 14px; border: 1.5px solid var(--sage); border-radius: 14px; background: none; color: var(--sage); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .expr-known-btn:hover { background: var(--sage); color: white; }
  .expr-known-btn.marked { background: var(--sage); color: white; }
  .expr-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-family: 'Lora', serif; font-size: 15px; font-style: italic; line-height: 1.7; }

  /* PATTERNS TAB */
  .patterns-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .patterns-header-title { font-family: 'Lora', serif; font-size: 16px; font-style: italic; color: var(--muted); }
  .patterns-show-mastered { background: none; border: 1.5px solid var(--line); border-radius: 14px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .patterns-show-mastered:hover { border-color: var(--sage); color: var(--sage); }
  .patterns-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-style: italic; font-family: 'Lora', serif; font-size: 16px; }
  .pattern-group { background: white; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 1px 6px var(--shadow); }
  .pattern-group-header { padding: 12px 18px; background: var(--paper-warm); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .pattern-group-name { font-size: 14px; font-weight: 500; }
  .pattern-count-badge { font-size: 11px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 10px; }
  .pattern-row { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .pattern-row:last-child { border-bottom: none; }
  .pattern-row.mastered { opacity: 0.4; }
  .pattern-content { display: flex; gap: 8px; align-items: flex-start; flex: 1; }
  .pattern-content::before { content: '→'; color: var(--sage); flex-shrink: 0; font-weight: 600; font-size: 13px; margin-top: 1px; }
  .pattern-text { font-size: 13px; line-height: 1.5; }
  .pattern-original { color: var(--muted); text-decoration: line-through; }
  .pattern-better { color: var(--accent); font-weight: 500; margin-left: 4px; }
  .pattern-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .mastered-btn { flex-shrink: 0; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .mastered-btn.active { background: none; border: 1.5px solid var(--sage); color: var(--sage); }
  .mastered-btn.active:hover { background: var(--sage); color: white; }
  .mastered-btn.done { background: var(--sage); border: 1.5px solid var(--sage); color: white; }
  .mastered-btn.done:hover { background: #e44; border-color: #e44; }
  .mastered-section-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; font-weight: 500; }

  /* HISTORY */
  .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-style: italic; font-family: 'Lora', serif; font-size: 16px; }
  .history-list { display: flex; flex-direction: column; gap: 16px; }
  .history-day { background: white; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px var(--shadow); }
  .history-day-header { padding: 12px 18px; background: var(--paper-warm); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .history-day-date { font-family: 'Lora', serif; font-size: 15px; font-style: italic; }
  .history-day-count { font-size: 11px; color: var(--muted); background: var(--cream); padding: 3px 10px; border-radius: 10px; }
  .history-entry-row { padding: 13px 18px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.12s; }
  .history-entry-row:last-child { border-bottom: none; }
  .history-entry-row:hover { background: var(--paper-warm); }
  .history-entry-original { font-family: 'Lora', serif; font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .history-entry-natural { font-family: 'Lora', serif; font-size: 14px; color: var(--ink); font-weight: 600; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .history-entry-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .history-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); }
  .history-dot.filled { background: var(--accent-light); }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-box { background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 1px 6px var(--shadow); }
  .stat-number { font-family: 'Lora', serif; font-size: 28px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .section-title { font-family: 'Lora', serif; font-size: 16px; font-style: italic; color: var(--muted); margin-bottom: 12px; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-label { font-size: 10px; text-align: center; color: var(--muted); font-weight: 500; padding-bottom: 4px; }
  .cal-day { aspect-ratio: 1; border-radius: 6px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); position: relative; }
  .cal-day.done { background: var(--accent); color: white; font-weight: 500; }
  .cal-day.today { border: 2px solid var(--accent); color: var(--accent); font-weight: 600; }
  .cal-day.today.done { border: none; color: white; }
  .cal-count { position: absolute; top: 1px; right: 2px; font-size: 7px; font-weight: 700; opacity: 0.85; }

  /* SUBTABS */
  .subtabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .subtab { padding: 6px 16px; border-radius: 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--line); color: var(--muted); background: white; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .subtab:hover { border-color: var(--accent-light); color: var(--ink); }
  .subtab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .subtab-panel { display: none; }
  .subtab-panel.active { display: block; }

  /* MISSION */
  .mission-card { background: var(--ink); color: var(--paper); border-radius: 12px; padding: 16px 18px; margin-top: 4px; position: relative; transition: all 0.3s; }
  .mission-card.done { background: var(--sage); }
  .mission-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 500; margin-bottom: 6px; }
  .mission-phrase { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .mission-meaning { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 10px; line-height: 1.4; }
  .mission-status { font-size: 13px; color: rgba(255,255,255,0.5); }
  .mission-status.complete { color: white; font-weight: 500; }
  .mission-complete-badge { position: absolute; top: 14px; right: 16px; font-size: 22px; }

  /* VOCAB TAB */
  .vocab-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .vocab-tab { padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--line); color: var(--muted); background: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .vocab-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .vocab-empty { text-align: center; padding: 50px 20px; color: var(--muted); font-style: italic; font-family: 'Lora', serif; font-size: 15px; line-height: 1.7; }
  .vocab-list { display: flex; flex-direction: column; gap: 10px; }
  .vocab-item { background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; box-shadow: 0 1px 4px var(--shadow); }
  .vocab-item.known { border-left: 3px solid var(--sage); }
  .vocab-item.mission-done { border-left: 3px solid var(--accent); }
  .vocab-phrase { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .vocab-meaning { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .vocab-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 500; white-space: nowrap; margin-top: 2px; display: inline-block; }
  .vocab-tag.learned { background: #e8f0fb; color: var(--blue); }
  .vocab-tag.known { background: #edf7ef; color: var(--sage); }
  .vocab-tag.mission { background: #fdf0e8; color: var(--accent); }
  .vocab-remove { background: none; border: 1.5px solid var(--line); border-radius: 12px; color: var(--muted); cursor: pointer; font-size: 11px; padding: 4px 10px; line-height: 1; flex-shrink: 0; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .vocab-remove:hover { color: #e44; border-color: #e44; }

  /* GROWTH TAB */
  .growth-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .growth-stat { background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px var(--shadow); }
  .growth-stat-num { font-family: 'Lora', serif; font-size: 26px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 3px; }
  .growth-stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; }
  .growth-section { margin-bottom: 24px; }
  .growth-section-title { font-family: 'Lora', serif; font-size: 15px; font-style: italic; color: var(--muted); margin-bottom: 12px; }
  .growth-compare { display: flex; flex-direction: column; gap: 10px; }
  .growth-compare-row { background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px var(--shadow); }
  .growth-compare-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .growth-compare-text { font-family: 'Lora', serif; font-size: 14px; color: var(--ink); line-height: 1.6; font-style: italic; }
  .growth-score-pill { background: var(--accent); color: white; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-style: normal; }
  .growth-score-pill.high { background: var(--sage); }
  .growth-improvement { display: flex; align-items: center; gap: 10px; background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px var(--shadow); }
  .growth-improvement-icon { font-size: 20px; flex-shrink: 0; }
  .growth-improvement-text { font-size: 13px; color: var(--ink); line-height: 1.5; }
  .growth-improvement-text strong { color: var(--sage); }
  .growth-report-btn { width: 100%; padding: 12px; border: 1.5px dashed var(--line); border-radius: 10px; background: none; font-size: 14px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-top: 4px; }
  .growth-report-btn:hover { border-color: var(--accent); color: var(--accent); background: white; }
  .growth-report-result { background: white; border: 1.5px solid var(--line); border-radius: 10px; padding: 16px 18px; margin-top: 12px; box-shadow: 0 1px 8px var(--shadow); font-size: 14px; line-height: 1.75; color: var(--ink); display: none; }
  .growth-report-result.show { display: block; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-label { font-size: 10px; text-align: center; color: var(--muted); font-weight: 500; padding-bottom: 4px; }
  .cal-day { aspect-ratio: 1; border-radius: 6px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); position: relative; }
  .cal-day.done { background: var(--accent); color: white; font-weight: 500; }
  .cal-day.today { border: 2px solid var(--accent); color: var(--accent); font-weight: 600; }
  .cal-day.today.done { border: none; color: white; }
  .cal-count { position: absolute; top: 1px; right: 2px; font-size: 7px; font-weight: 700; opacity: 0.85; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,20,16,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; max-width: 580px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .modal-date { font-family: 'Lora', serif; font-size: 16px; font-style: italic; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 4px; line-height: 1; }
  .modal-body { padding: 18px 22px 22px; }
  .modal-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .score-dots { display: flex; gap: 5px; }
  .score-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--line); }
  .score-dot.filled { background: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>Daily English</h1>
      <div class="subtitle">오늘도 한 줄씩, 자연스럽게</div>
    </div>
    <div class="streak-badge">✨ <span id="masteredCount">0</span>일 작성</div>
    <button class="settings-btn" onclick="openSettings()" title="설정">⚙️</button>
  </div>

  <!-- REVIEW BANNER -->
  <div class="review-banner" id="reviewBanner" style="display:none;" onclick="switchTab('learn');setTimeout(()=>switchSubtab('learn','patterns'),50)">
    <button class="review-banner-close" onclick="event.stopPropagation();document.getElementById('reviewBanner').style.display='none'">×</button>
    <div class="review-banner-label">📬 어제 틀린 표현</div>
    <div class="review-banner-text" id="reviewBannerText"></div>
    <div class="review-banner-hint">탭해서 패턴 복습하기 →</div>
  </div>

  <div class="date-nav">
    <button class="nav-btn" id="prevDay" onclick="changeDay(-1)">←</button>
    <div class="date-display" id="dateDisplay"></div>
    <button class="nav-btn" id="nextDay" onclick="changeDay(1)">→</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('write')">✏️ 오늘</div>
    <div class="tab"        onclick="switchTab('learn')">💡 배움</div>
    <div class="tab"        onclick="switchTab('record')">📈 기록</div>
  </div>

  <!-- TODAY TAB -->
  <div class="tab-panel active" id="tab-write">
    <div class="today-entries" id="todayEntries"></div>
    <div id="loadingSlot"></div>
    <div class="prompt-card">
      <div class="prompt-label">💡 주제 제안</div>
      <div class="prompt-text" id="promptText"></div>
      <button class="prompt-refresh" onclick="refreshPrompt()">다른 주제로 바꾸기</button>
    </div>
    <div class="write-section">
      <div class="write-label" id="writeLabel">영어로 자유롭게 써보세요</div>
      <textarea class="write-area" id="userInput" placeholder="Today I went to the store and buyed some food..."></textarea>
      <div class="write-toolbar">
        <span class="char-count" id="charCount">0자</span>
        <div class="toolbar-right">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="음성">🎤</button>
          <button class="submit-btn" id="submitBtn" onclick="submitEntry()">교정 받기 →</button>
        </div>
      </div>
    </div>
    <div id="missionSlot"></div>
  </div>

  <!-- LEARN TAB -->
  <div class="tab-panel" id="tab-learn">
    <div class="subtabs">
      <div class="subtab active" onclick="switchSubtab('learn','expressions')">오늘의 추천</div>
      <div class="subtab"        onclick="switchSubtab('learn','vocab')">저장한 표현</div>
    </div>
    <div class="subtab-panel active" id="sub-expressions"><div id="expressionsContent"></div></div>
    <div class="subtab-panel"        id="sub-vocab"><div id="vocabContent"></div></div>
  </div>

  <!-- RECORD TAB -->
  <div class="tab-panel" id="tab-record">
    <div class="subtabs">
      <div class="subtab active" onclick="switchSubtab('record','history')">지난 일기</div>
      <div class="subtab"        onclick="switchSubtab('record','stats')">성장 기록</div>
    </div>
    <div class="subtab-panel active" id="sub-history"><div id="historyContent"></div></div>
    <div class="subtab-panel"        id="sub-stats"><div id="growthContent"></div></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="modal" style="max-width:360px;">
    <div class="modal-header">
      <div class="modal-date">⚙️ 설정</div>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div style="padding:20px 0 8px;">
      <div class="settings-row">
        <div>
          <div class="settings-label">💭 심리상담사 피드백</div>
          <div class="settings-desc">일기에 담긴 감정을 심리상담사 관점에서 따뜻하게 코멘트해드려요</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="counselorToggle" onchange="toggleCounselor(this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <hr style="border:none;border-top:1px solid var(--line);margin:16px 0;">

      <div class="settings-label" style="margin-bottom:12px;">📦 데이터 백업</div>
      <div class="settings-desc" style="margin-bottom:14px;">일기, 저장한 표현, 설정을 파일로 저장해두세요. 브라우저 캐시가 지워져도 복원할 수 있어요.</div>
      <div style="display:flex;gap:10px;">
        <button class="fitb-check-btn" style="flex:1;background:var(--sage);color:white;border:none;" onclick="exportData()">⬇ 내보내기</button>
        <button class="fitb-check-btn" style="flex:1;" onclick="document.getElementById('importFile').click()">⬆ 불러오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      </div>
      <div id="importStatus" style="font-size:12px;color:var(--sage);margin-top:10px;text-align:center;"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────
let currentDate = new Date();
let entries   = JSON.parse(localStorage.getItem('dailyEnglishV2_entries') || '{}');
// mastered: Set of tip keys (category+original) the user marked as learned
let mastered  = new Set(JSON.parse(localStorage.getItem('dailyEnglish_mastered') || '[]'));
let showMastered = false;
let recognition = null, isRecording = false;

const PROMPTS = [
  "오늘 하루 중 가장 기억에 남는 순간은?","오늘 먹은 것 중 제일 맛있었던 건?",
  "요즘 가장 자주 생각하는 것은?","최근에 새로 시도해본 것이 있나요?",
  "지금 이 순간 기분이 어떤가요?","요즘 가장 즐거운 시간은 언제인가요?",
  "내일 기대되는 것이 있나요?","최근에 본 영화나 드라마 소개해보세요.",
  "주말에 어디 가거나 뭔가 하고 싶다면?","오늘 배운 것, 느낀 것이 있다면?",
  "오늘 하늘이나 날씨를 묘사해보세요.","가장 최근에 웃었던 순간은?",
  "지금 가장 가고 싶은 곳은?","오늘 고마웠던 사람이나 순간이 있나요?",
];
let currentPromptIndex = Math.floor(Math.random() * PROMPTS.length);

// ─── INIT ─────────────────────────────────────────────────
function init() {
  // attach input listener after DOM ready
  const ta = document.getElementById('userInput');
  if (ta) {
    ta.addEventListener('input', () => { updateCharCount(); checkMissionInInput(); });
  }
  updateDateDisplay(); updateStreak(); renderTodayEntries(); updateWriteLabel();
  document.getElementById('promptText').textContent = PROMPTS[currentPromptIndex];
  showReviewBanner(); renderMission();
}

function getDateKey(d) { return d.toISOString().slice(0,10); }
function formatDateKo(d) {
  const days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function updateDateDisplay() {
  const todayKey=getDateKey(new Date()), currentKey=getDateKey(currentDate);
  document.getElementById('dateDisplay').textContent =
    currentKey===todayKey ? '오늘, '+formatDateKo(currentDate) : formatDateKo(currentDate);
  document.getElementById('nextDay').disabled = currentKey >= todayKey;
}
function changeDay(delta) {
  const d=new Date(currentDate); d.setDate(d.getDate()+delta);
  if(d>new Date()) return;
  currentDate=d; updateDateDisplay(); renderTodayEntries(); updateWriteLabel();
  document.getElementById('userInput').value='';
  document.getElementById('charCount').textContent='0자';
  document.getElementById('loadingSlot').innerHTML='';
}
function refreshPrompt() {
  currentPromptIndex=(currentPromptIndex+1)%PROMPTS.length;
  document.getElementById('promptText').textContent=PROMPTS[currentPromptIndex];
}
function updateCharCount() {
  document.getElementById('charCount').textContent=document.getElementById('userInput').value.trim().length+'자';
}
function updateWriteLabel() {
  const count=(entries[getDateKey(currentDate)]||[]).length;
  document.getElementById('writeLabel').textContent=count===0?'영어로 자유롭게 써보세요':`${count+1}번째 문장 추가`;
}

// ─── REVIEW BANNER ────────────────────────────────────────
function showReviewBanner() {
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const arr=entries[getDateKey(yesterday)]||[];
  if(!arr.length) return;
  // pick a tip that's not yet mastered
  const allTips=arr.flatMap(e=>(e.tips||[]).map(t=>({...t})));
  const unmastered=allTips.filter(t=>!mastered.has(tipKey(t)));
  const pick=unmastered.length ? unmastered[Math.floor(Math.random()*unmastered.length)] : allTips[0];
  if(!pick) return;
  document.getElementById('reviewBannerText').textContent=`"${pick.original}" → "${pick.better}" — ${pick.reason}`;
  document.getElementById('reviewBanner').style.display='block';
}

function tipKey(t) { return (t.category||'기타')+'::'+t.original; }

// ─── RENDER TODAY ─────────────────────────────────────────
function renderTodayEntries() {
  const dateKey=getDateKey(currentDate), dayArr=entries[dateKey]||[];
  const container=document.getElementById('todayEntries');
  if(!dayArr.length){container.innerHTML='';return;}
  container.innerHTML=dayArr.map((e,i)=>buildEntryBlock(e,i,dateKey)).join('');
}

function buildEntryBlock(e, i, dateKey) {
  const miniDots=Array.from({length:10},(_,j)=>`<div class="mini-dot ${j<e.fluencyScore?'filled':''}"></div>`).join('');
  const timeTag=e.time?` <span style="color:var(--muted);font-size:11px;margin-left:4px;">${e.time}</span>`:'';

  // Build key phrases list + multi-blank practice sentence
  const keyPhrasesHtml = (e.keyPhrases||[]).map(kp => `
    <div class="key-phrase-item">
      <div class="key-phrase-header">
        <span class="key-phrase-word">${escapeHtml(kp.phrase)}</span>
        <span class="key-phrase-meaning">${escapeHtml(kp.meaning)}</span>
      </div>
      <div class="key-phrase-why">${escapeHtml(kp.why)}</div>
      <div class="key-phrase-example">"${escapeHtml(kp.exampleFromText)}"</div>
    </div>`).join('');

  // Build multi-blank practice sentence from practiceText
  const fid = `fitb-${dateKey}-${i}`;
  let practiceHtml = '';
  if (e.practiceText) {
    let blankIdx = 0;
    const practiceRendered = escapeHtml(e.practiceText).replace(/___/g, () => {
      const bid = `${fid}-${blankIdx++}`;
      return `<span class="fitb-blank"><input class="fitb-input" id="${bid}" size="12" autocomplete="off" spellcheck="false" placeholder="..."></span>`;
    });
    const answerPhrases = (e.practiceAnswers && e.practiceAnswers.length)
      ? e.practiceAnswers.join(',')
      : (e.keyPhrases||[]).map(kp=>kp.phrase).join(',');
    practiceHtml = `
      <div class="entry-practice-zone">
        <div class="entry-practice-label">✏️ 직접 써보기</div>
        <div class="fitb-sentence">${practiceRendered}</div>
        <div class="fitb-actions">
          <button class="fitb-check-btn" onclick="checkMultiFITB('${fid}', ${blankIdx}, '${escapeAttr(answerPhrases)}')">확인</button>
        </div>
        <div class="fitb-feedback" id="fb-${fid}"></div>
      </div>`;
  }

  return `
    <div class="entry-block">
      <div class="entry-block-header">
        <span class="entry-index">${i+1}번째${timeTag}</span>
        <div class="entry-header-right">
          <div class="entry-score-mini"><div class="mini-dots">${miniDots}</div><span>${e.fluencyScore}/10</span></div>
          <button class="entry-delete" onclick="deleteEntry('${dateKey}',${i})">×</button>
        </div>
      </div>
      <div class="entry-body">
        <div class="entry-original">"${escapeHtml(e.original)}"</div>
        <div class="entry-natural">→ "${escapeHtml(e.naturalVersion)}"</div>
        ${keyPhrasesHtml ? `<div class="entry-keyphrases">${keyPhrasesHtml}</div>` : ''}
        ${practiceHtml}
        <div class="entry-encouragement">🌿 ${escapeHtml(e.encouragement)}</div>
        ${settings.counselor && e.counselorNote ? `<div class="entry-counselor">💭 ${escapeHtml(e.counselorNote)}</div>` : ''}
      </div>
    </div>`;
}

// Build sentence with the target word replaced by an input blank
// Verb conjugations (most common irregulars)
const VERB_VARIANTS = {
  'have':['have','has','had','having'],'be':['be','am','is','are','was','were','being','been'],
  'do':['do','does','did','doing','done'],'go':['go','goes','went','going','gone'],
  'get':['get','gets','got','getting','gotten'],'make':['make','makes','made','making'],
  'take':['take','takes','took','taking','taken'],'give':['give','gives','gave','giving','given'],
  'come':['come','comes','came','coming'],'see':['see','sees','saw','seeing','seen'],
  'know':['know','knows','knew','knowing','known'],'think':['think','thinks','thought','thinking'],
  'say':['say','says','said','saying'],'tell':['tell','tells','told','telling'],
  'find':['find','finds','found','finding'],'feel':['feel','feels','felt','feeling'],
  'leave':['leave','leaves','left','leaving'],'put':['put','puts','putting'],
  'bring':['bring','brings','brought','bringing'],'keep':['keep','keeps','kept','keeping'],
  'hold':['hold','holds','held','holding'],'stand':['stand','stands','stood','standing'],
  'speak':['speak','speaks','spoke','speaking','spoken'],'run':['run','runs','ran','running'],
  'break':['break','breaks','broke','breaking','broken']
};
const NOUN_PLACEHOLDERS = ['someone','somebody','sb','one','sth','something'];
const POSS_PLACEHOLDERS = ["someone's","somebody's","one's","sb's","someones"];
const POSS_PATTERN = "(?:my|your|his|her|its|our|their|[\\w]+'s)";

function fitbWordToPattern(word, isFirst) {
  const lower = word.toLowerCase().replace(/[.,!?;:]/g,'');
  if (POSS_PLACEHOLDERS.includes(lower)) return POSS_PATTERN;
  if (NOUN_PLACEHOLDERS.includes(lower)) return "[\\w]+";
  if (VERB_VARIANTS[lower]) return '(?:' + VERB_VARIANTS[lower].map(escapeRegex).join('|') + ')';
  // First word may be an unknown verb — allow -s/-ed/-ing
  if (isFirst && lower.length >= 3 && /^[a-z]+$/.test(lower)) {
    return '(?:' + escapeRegex(lower) + '(?:s|ed|ing)?)';
  }
  return escapeRegex(lower);
}

function buildFITBSentence(sentence, targetWord, fid) {
  if (!sentence || !targetWord) return escapeHtml(sentence||'');

  const blankHtml = (matchedText) => `<span class="fitb-blank"><input class="fitb-input" id="${fid}" size="${Math.max(matchedText.length+2,8)}" autocomplete="off" spellcheck="false" placeholder="..."></span>`;

  // Strategy 1: exact phrase match (case-insensitive)
  const reExact = new RegExp('(' + escapeRegex(targetWord) + ')', 'i');
  const partsExact = sentence.split(reExact);
  if (partsExact.length > 1) {
    return partsExact.map(p => reExact.test(p) ? blankHtml(p) : escapeHtml(p)).join('');
  }

  // Strategy 2: flexible match — verb conjugation + placeholder substitution
  try {
    const words = targetWord.trim().split(/\s+/);
    const flexPattern = '\\b' + words.map((w,i)=>fitbWordToPattern(w, i===0)).join('\\s+') + '\\b';
    const reFlex = new RegExp('(' + flexPattern + ')', 'i');
    const partsFlex = sentence.split(reFlex);
    if (partsFlex.length > 1) {
      return partsFlex.map(p => reFlex.test(p) ? blankHtml(p) : escapeHtml(p)).join('');
    }
  } catch(e) { /* malformed phrase, fall through */ }

  // No reliable match — show example without blank rather than awkward fallback
  return escapeHtml(sentence);
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function checkFITB(fid, correct) {
  const input = document.getElementById(fid);
  const fb = document.getElementById('fb-' + fid);
  if (!input) return;
  const userVal = input.value.trim().toLowerCase();
  const correctLower = correct.toLowerCase();

  // Accept if: exact match OR user typed the key verb/noun from the phrase
  const keyWords = correctLower.split(/\s+/).filter(w => w.length > 2);
  const isCorrect = userVal === correctLower || keyWords.some(w => userVal.includes(w));

  input.classList.toggle('correct', isCorrect);
  input.classList.toggle('wrong', !isCorrect);
  fb.className = 'fitb-feedback show ' + (isCorrect ? 'good' : 'bad');
  fb.textContent = isCorrect
    ? `✅ 맞아요! 정답: "${correct}"`
    : `정답: "${correct}" — 다시 입력해봐요.`;
  if (!isCorrect) { setTimeout(()=>{ input.value=''; input.classList.remove('wrong'); }, 1400); }
}

function checkMultiFITB(fid, blankCount, answerPhrases) {
  const phrases = answerPhrases.split(',').map(p => p.trim());
  const fb = document.getElementById('fb-' + fid);
  let allCorrect = true;

  for (let i = 0; i < blankCount; i++) {
    const input = document.getElementById(`${fid}-${i}`);
    if (!input) continue;
    const userVal = input.value.trim().toLowerCase();

    // Use ordered match: phrases[i] is the correct answer for blank i
    const correctAnswer = phrases[i] || phrases[phrases.length - 1];
    const keyWords = correctAnswer.toLowerCase().split(/\s+/).filter(w => w.length > 2);
    const isCorrect = userVal === correctAnswer.toLowerCase() || keyWords.some(w => userVal.includes(w));

    input.classList.toggle('correct', isCorrect);
    input.classList.toggle('wrong', !isCorrect);
    if (!isCorrect) {
      allCorrect = false;
      setTimeout((() => {
        const inp = input;
        const ans = correctAnswer;
        return () => {
          inp.value = ans;
          inp.classList.remove('wrong');
          inp.classList.add('correct');
          inp.style.color = 'var(--sage)';
          inp.style.fontStyle = 'italic';
        };
      })(), 800);
    }
  }

  fb.className = 'fitb-feedback show ' + (allCorrect ? 'good' : 'bad');
  fb.textContent = allCorrect ? '✅ 완벽해요!' : '정답을 확인해보세요.';
}

function deleteEntry(dateKey, index) {

  entries[dateKey].splice(index,1);

}

function toggleMic() {
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Chrome에서만 지원됩니다.');return;}
  if(isRecording){recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR(); recognition.lang='en-US'; recognition.interimResults=true;
  const mic=document.getElementById('micBtn'), ta=document.getElementById('userInput');
  recognition.onstart=()=>{isRecording=true;mic.classList.add('recording');mic.textContent='⏹️';};
  recognition.onresult=(e)=>{
    let f=''; for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) f+=e.results[i][0].transcript;
    if(f){ta.value+=(ta.value?' ':'')+f;updateCharCount();}
  };
  recognition.onend=()=>{isRecording=false;mic.classList.remove('recording');mic.textContent='🎤';};
  recognition.onerror=()=>{isRecording=false;mic.classList.remove('recording');mic.textContent='🎤';};
  recognition.start();
}

async function submitEntry() {
  const text=document.getElementById('userInput').value.trim();
  if(text.length<5){alert('영어로 좀 더 써주세요! (최소 5자)');return;}
  const btn=document.getElementById('submitBtn'); btn.disabled=true;
  document.getElementById('loadingSlot').innerHTML=`<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><div class="loading-text">교정하는 중...</div></div>`;
  try {
    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-5-20250929',max_tokens:1500,
        system:`You are a fluent English coach for Korean intermediate learners. Your job is NOT just to fix errors — rewrite the text to sound like something a native English speaker would naturally say, then teach 2-3 key expressions from your rewrite.

Respond ONLY with a JSON object (no markdown, no backticks):
{
  "naturalVersion": "Completely natural, fluent rewrite. Use native phrasing, idioms, contractions, and flow. Make it clearly better than the original.",
  "fluencyScore": 6,
  "keyPhrases": [
    {
      "phrase": "insist that",
      "meaning": "~하겠다고 고집하다",
      "why": "'very stubborn that'은 콩글리시예요. 원어민은 'insisted that we order'처럼 써요.",
      "exampleFromText": "My aunt insisted that we order more food."
    }
  ],
  "practiceText": "My aunt ___ that we order more food. She always wants to ___ her family to good food.",
  "practiceAnswers": ["insisted that", "treat"],
  "encouragement": "warm 1-sentence in Korean",
  "counselorNote": null
}

Rules:
- naturalVersion: truly native-sounding rewrite, not just error-corrected. Use contractions, natural connectors, idioms where appropriate.
- keyPhrases: 3-5 items. Pick ALL notably useful or natural expressions from naturalVersion — idioms, collocations, vocabulary upgrades. exampleFromText must be a sentence from naturalVersion containing phrase verbatim.
- practiceText: 2-3 sentences from naturalVersion with 3-5 blanks (___) covering as many keyPhrases as possible. CRITICAL: each blank (___) must replace exactly ONE complete phrase from keyPhrases — never split a multi-word phrase into multiple blanks.
- practiceAnswers: array of phrases in the EXACT ORDER they appear as blanks in practiceText. e.g. if practiceText has 3 blanks, practiceAnswers must have exactly 3 items in left-to-right order.
- fluencyScore: 1-10 integer.
- counselorNote: if the diary text contains any emotions, stress, relationships, or personal experiences worth reflecting on, write 3-4 sentences in Korean combining warm empathy AND a gentle cognitive-behavioral insight. Format: first acknowledge the feeling warmly, then offer one reframing thought or observation a counselor might share. If the text is purely factual with no emotional content, set to null.`,
        messages:[{role:'user',content:text}]
      })
    });
    if(!res.ok) throw new Error(`서버 오류 (${res.status}) — 잠시 후 다시 시도해주세요`);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'API 오류');
    const raw=data.content?.[0]?.text||'';
    const clean=raw.replace(/```json|```/g,'').trim();
    const jsonMatch=clean.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('응답 형식 오류');
    const result=JSON.parse(jsonMatch[0]);
    const dateKey=getDateKey(currentDate);
    const now=new Date();
    const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    if(!entries[dateKey]) entries[dateKey]=[];
    entries[dateKey].push({original:text,...result,time});
    // Auto-save keyPhrases to vocab as 'learned'
    (result.keyPhrases||[]).forEach(kp => addToVocab(kp.phrase, kp.meaning, 'learned', kp.exampleFromText));
    save();
    document.getElementById('loadingSlot').innerHTML='';
    document.getElementById('userInput').value='';
    document.getElementById('charCount').textContent='0자';
    renderTodayEntries(); updateWriteLabel(); updateStreak();
    setTimeout(()=>{
      const blocks=document.querySelectorAll('.entry-block');
      if(blocks.length) blocks[blocks.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});
    },150);
  } catch(err) {
    document.getElementById('loadingSlot').innerHTML=`<div style="padding:16px;color:#e44;text-align:center;font-size:14px;background:white;border:1.5px solid var(--line);border-radius:12px;margin-bottom:16px;">⚠️ ${err.message||'오류가 발생했습니다.'}<br><small style="color:var(--muted)">잠시 후 다시 시도해주세요</small></div>`;
  } finally { btn.disabled=false; }
}

function updateStreak() { updateStats(); }

// ─── MISSION ──────────────────────────────────────────────
function getTodayMission() {
  const todayKey = getDateKey(new Date());
  const completedMissions = JSON.parse(localStorage.getItem('dailyEnglish_completedMissions') || '{}');
  if (completedMissions[todayKey]) return { ...completedMissions[todayKey], done: true };
  const vocab = getVocabItems();
  if (!vocab.length) return null;
  const known = vocab.filter(v => v.type === 'known');
  const learned = vocab.filter(v => v.type === 'learned');
  const pool = known.length ? known : learned;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  return pick ? { phrase: pick.phrase, meaning: pick.meaning, done: false } : null;
}

function renderMission() {
  const slot = document.getElementById('missionSlot');
  const mission = getTodayMission();
  if (!mission) { slot.innerHTML = ''; return; }
  slot.innerHTML = `
    <div class="mission-card ${mission.done ? 'done' : ''}" id="missionCard">
      ${mission.done ? '<div class="mission-complete-badge">✅</div>' : ''}
      <div class="mission-label">🎯 오늘의 미션</div>
      <div class="mission-phrase">${escapeHtml(mission.phrase)}</div>
      <div class="mission-meaning">${escapeHtml(mission.meaning)}</div>
      <div class="mission-status ${mission.done ? 'complete' : ''}" id="missionStatus">
        ${mission.done ? '오늘 이 표현을 썼어요!' : '이 표현을 오늘 일기에 써보세요'}
      </div>
    </div>`;
}

function checkMissionInInput() {
  const mission = getTodayMission();
  if (!mission || mission.done) return;
  const text = document.getElementById('userInput').value.toLowerCase();
  if (text.includes(mission.phrase.toLowerCase())) completeMission(mission);
}

function completeMission(mission) {
  const todayKey = getDateKey(new Date());
  const cm = JSON.parse(localStorage.getItem('dailyEnglish_completedMissions') || '{}');
  cm[todayKey] = { ...mission, done: true };
  localStorage.setItem('dailyEnglish_completedMissions', JSON.stringify(cm));
  renderMission();
}

// ─── VOCAB ────────────────────────────────────────────────
function getVocabItems() { return JSON.parse(localStorage.getItem('dailyEnglish_vocab') || '[]'); }
function saveVocab(vocab) { localStorage.setItem('dailyEnglish_vocab', JSON.stringify(vocab)); }

function addToVocab(phrase, meaning, type, example) {
  const vocab = getVocabItems();
  if (vocab.find(v => v.phrase.toLowerCase() === phrase.toLowerCase())) return;
  vocab.unshift({ phrase, meaning, type, example: example||'', addedAt: getDateKey(new Date()) });
  saveVocab(vocab);
}

function removeFromVocab(phrase) {
  saveVocab(getVocabItems().filter(v => v.phrase !== phrase));
  renderVocab();
}

function renderVocab() {
  const vocab = getVocabItems();
  const container = document.getElementById('vocabContent');

  // ── 저장한 표현 섹션 ──
  let vocabHtml = '';
  if (!vocab.length) {
    vocabHtml = '<div class="vocab-empty">아직 저장된 표현이 없어요.<br>오늘의 추천에서 배운 표현을 저장해보세요 💡</div>';
  } else {
    vocabHtml = vocab.map(v => `
      <div class="vocab-item">
        <div style="flex:1;">
          <div class="vocab-phrase">${escapeHtml(v.phrase)}</div>
          <div class="vocab-meaning">${escapeHtml(v.meaning)}</div>
          ${v.example ? `<div style="font-size:12px;font-style:italic;color:var(--sage);margin-top:6px;padding:6px 10px;background:var(--cream);border-radius:6px;line-height:1.55;">"${escapeHtml(v.example)}"</div>` : ''}
          <div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
            <span class="vocab-tag learned">새로 배운</span>
            <span style="font-size:10px;color:var(--muted);">${v.addedAt}</span>
          </div>
        </div>
        <button class="vocab-remove" onclick="removeFromVocab('${escapeAttr(v.phrase)}')" title="그만 볼게요">그만 볼게요</button>
      </div>`).join('');
  }

  // ── 실수 패턴 섹션 ──
  const allTips = [];
  Object.entries(entries).sort().reverse().forEach(([dateKey, dayArr]) => {
    const d = new Date(dateKey+'T00:00:00');
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    dayArr.forEach(e => (e.tips||[]).forEach(t => allTips.push({...t, dateStr, key:tipKey(t)})));
  });

  let patternsHtml = '';
  if (allTips.length) {
    const grouped = {}, seen = {};
    allTips.forEach(t => {
      const cat = t.category||'기타';
      const dk = cat+'::'+t.original.toLowerCase();
      if (!seen[dk]) { seen[dk]=true; if (!grouped[cat]) grouped[cat]=[]; grouped[cat].push(t); }
    });
    const active = Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length)
      .flatMap(([cat, tips]) => tips.filter(t => !mastered.has(t.key)).map(t => ({...t, cat})));
    if (active.length) {
      patternsHtml = active.map(t => `
        <div class="vocab-item" style="border-left:3px solid #e44;">
          <div style="flex:1;">
            <div class="vocab-phrase" style="font-size:13px;"><span style="color:var(--muted);text-decoration:line-through;">${escapeHtml(t.original)}</span> → <span style="color:var(--ink);">${escapeHtml(t.better)}</span></div>
            <div class="vocab-meaning">${escapeHtml(t.reason)}</div>
            <div style="margin-top:4px;"><span class="vocab-tag" style="background:#fde8e8;color:#c0392b;">실수 패턴 · ${escapeHtml(t.cat)}</span></div>
          </div>
          <button class="vocab-remove" style="color:var(--sage);border-color:var(--sage);font-size:11px;" onclick="learnPattern('${t.key.replace(/'/g,"\'")}','${escapeAttr(t.better)}','${escapeAttr(t.reason)}')">배웠어요 ✓</button>
        </div>`).join('');
    }
  }

  const patternSection = patternsHtml ? `
    <div style="margin-top:24px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">🔴 아직 헷갈리는 표현</div>
      <div class="vocab-list">${patternsHtml}</div>
    </div>` : '';

  container.innerHTML = `
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">📚 저장한 표현</div>
    <div class="vocab-list">${vocabHtml}</div>
    ${patternSection}`;
}

function learnPattern(key, better, reason) {
  mastered.add(key);
  save(); updateStats();
  addToVocab(better, reason, 'learned');
  renderVocab();
}

// ─── GROWTH TAB ───────────────────────────────────────────
function renderGrowth() {
  const allEntries = Object.values(entries).flat();
  const now = new Date(), year = now.getFullYear(), month = now.getMonth();
  let thisMonth = 0;
  for (let d=1;d<=new Date(year,month+1,0).getDate();d++) {
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(entries[k]?.length) thisMonth++;
  }
  const first10 = allEntries.slice(0,10), last10 = allEntries.slice(-10);
  const avg = arr => arr.length ? (arr.reduce((s,e)=>s+(e.fluencyScore||6),0)/arr.length).toFixed(1) : null;
  const avgFirst = avg(first10), avgLast = avg(last10);
  const improvement = avgFirst && avgLast ? (avgLast - avgFirst).toFixed(1) : null;
  const wc = e => (e.naturalVersion||e.original||'').split(/\s+/).filter(Boolean).length;
  const avgWF = first10.length ? Math.round(first10.reduce((s,e)=>s+wc(e),0)/first10.length) : null;
  const avgWL = last10.length  ? Math.round(last10.reduce((s,e)=>s+wc(e),0)/last10.length)  : null;
  const firstE = allEntries[0], lastE = allEntries[allEntries.length-1];
  const mAgo = new Date(); mAgo.setMonth(mAgo.getMonth()-1);

      <div class="growth-improvement-text">fluency 점수 <strong>${avgFirst} → ${avgLast}</strong>${parseFloat(improvement)>0?` <strong>(+${improvement}점 향상!)</strong>`:' (유지 중)'}</div></div>
    ${avgWF&&avgWL?`<div class="growth-improvement"><div class="growth-improvement-icon">✍️</div>
      <div class="growth-improvement-text">문장 평균 길이 <strong>${avgWF}단어 → ${avgWL}단어</strong>${avgWL>avgWF?' <strong>(더 풍부해졌어요!)</strong>':''}</div></div>`:''}
    ${mastered.size?`<div class="growth-improvement"><div class="growth-improvement-icon">✅</div>
      <div class="growth-improvement-text">총 <strong>${totalTips}개</strong> 실수 중 <strong>${mastered.size}개</strong> 마스터 완료</div></div>`:''}
  </div>` : '';

  const cmpHtml = (firstE||lastE) ? `<div class="growth-section"><div class="growth-section-title">처음 vs 지금</div><div class="growth-compare">
    ${firstE?`<div class="growth-compare-row"><div class="growth-compare-label"><span>처음 쓴 문장</span><span class="growth-score-pill">${firstE.fluencyScore}/10</span></div><div class="growth-compare-text">"${escapeHtml(firstE.original)}"</div></div>`:''}
    ${lastE&&lastE!==firstE?`<div class="growth-compare-row"><div class="growth-compare-label"><span>가장 최근 문장</span><span class="growth-score-pill high">${lastE.fluencyScore}/10</span></div><div class="growth-compare-text">"${escapeHtml(lastE.original)}"</div></div>`:''}
    ${mAgoE&&mAgoE!==firstE?`<div class="growth-compare-row"><div class="growth-compare-label"><span>한 달 전 문장</span><span class="growth-score-pill">${mAgoE.fluencyScore}/10</span></div><div class="growth-compare-text">"${escapeHtml(mAgoE.original)}"</div></div>`:''}

async function generateGrowthReport() {
  const btn = document.getElementById('growthReportBtn');
  const result = document.getElementById('growthReportResult');
  btn.disabled=true; btn.textContent='분석 중...';
  const allEntries = Object.values(entries).flat();
  if (allEntries.length < 3) {
    result.className='growth-report-result show'; result.textContent='문장이 3개 이상 있어야 분석할 수 있어요.';
    btn.disabled=false; btn.textContent='✨ AI 실력 분석 받기'; return;
  }
  const sample = allEntries.slice(-20).map(e=>`[${e.fluencyScore}/10] ${(e.original||'').replace(/`/g,"'")} → ${(e.naturalVersion||'').replace(/`/g,"'")}`).join('\n');
  const tipSummary = allEntries.flatMap(e=>e.tips||[]).reduce((acc,t)=>{ acc[t.category||'기타']=(acc[t.category||'기타']||0)+1; return acc; },{});

function renderCalendar() {
  const el=document.getElementById('calendarGrid'); if(!el) return;
  const now=new Date(),year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate(),todayKey=getDateKey(now);
  let html=['일','월','화','수','목','금','토'].map(l=>`<div class="cal-label">${l}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+='<div></div>';

    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function toggleShowMastered() {
  showMastered = !showMastered;
  document.getElementById('toggleMasteredBtn').textContent = showMastered ? '✅ 해결된 것 숨기기' : '✅ 해결된 것 보기';
  renderPatterns();
}

function toggleMastered(key) {
  if(mastered.has(key)) mastered.delete(key);
  else mastered.add(key);
  save(); updateStats(); renderPatterns();
}

function renderPatterns() {
  // collect all tips with metadata
  const allTips = [];
  Object.entries(entries).sort().reverse().forEach(([dateKey, dayArr]) => {
    const d=new Date(dateKey+'T00:00:00');
    const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    dayArr.forEach(e => (e.tips||[]).forEach(t => allTips.push({...t, dateStr, key:tipKey(t)})));
  });

  if(!allTips.length){
    document.getElementById('patternsContent').innerHTML='<div class="patterns-empty">아직 교정 기록이 없어요.<br>일기를 써보면 패턴이 쌓여요 📌</div>';
    return;
  }

  // group by category, deduplicate by original
  const grouped = {};
  const seen = {};
  allTips.forEach(t => {
    const cat=t.category||'기타';
    const dedupeKey=cat+'::'+t.original.toLowerCase();
    if(!seen[dedupeKey]) { seen[dedupeKey]=true; if(!grouped[cat]) grouped[cat]=[]; grouped[cat].push(t); }
  });

  const activeCats = Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length);

  let html = '';
  activeCats.forEach(([cat, tips]) => {
    const active = tips.filter(t => !mastered.has(t.key));
    const done   = tips.filter(t =>  mastered.has(t.key));
    const visibleActive = active;
    const visibleDone   = showMastered ? done : [];

    if(!visibleActive.length && !visibleDone.length) return;

    const makeRow = (t, isMastered) => `
      <div class="pattern-row ${isMastered?'mastered':''}">
        <div class="pattern-content">
          <div class="pattern-text">
            <span class="pattern-original">${escapeHtml(t.original)}</span>
            <span class="pattern-better">${escapeHtml(t.better)}</span>
            <div class="pattern-meta">${t.dateStr} — ${escapeHtml(t.reason)}</div>
          </div>
        </div>
        <button class="mastered-btn ${isMastered?'done':'active'}" onclick="toggleMastered('${t.key.replace(/'/g,"\\'")}')">
          ${isMastered ? '↩ 되돌리기' : '✅ 이제 알았어요'}
        </button>
      </div>`;

    const activeRows = visibleActive.map(t=>makeRow(t,false)).join('');
    const doneRows   = visibleDone.map(t=>makeRow(t,true)).join('');

    html += `
      <div class="pattern-group">
        <div class="pattern-group-header">
          <div class="pattern-group-name">${cat}</div>
          <div class="pattern-count-badge">${active.length}개 남음</div>
        </div>
        ${activeRows}${doneRows}
      </div>`;
  });

  if(!html) html='<div class="patterns-empty">미해결 패턴이 없어요! 🎉<br>모두 마스터했어요.</div>';
  document.getElementById('patternsContent').innerHTML=html;
}

// knownExprs: Set of expression phrases user marked as already known
let knownExprs = new Set(JSON.parse(localStorage.getItem('dailyEnglish_knownExprs') || '[]'));
let cachedExprs = JSON.parse(localStorage.getItem('dailyEnglish_cachedExprs') || 'null');
let cachedExprsDate = localStorage.getItem('dailyEnglish_cachedExprsDate') || '';
let settings = JSON.parse(localStorage.getItem('dailyEnglish_settings') || '{"counselor":false}');
function saveSettings() { localStorage.setItem('dailyEnglish_settings', JSON.stringify(settings)); }

function computeLevelProfile() {
  // average fluency score from recent entries
  const allEntries = Object.values(entries).flat();
  if (!allEntries.length) return { avgScore: 6, level: 'intermediate', knownPhrases: [] };
  const recent = allEntries.slice(-20);
  const avg = recent.reduce((s,e) => s + (e.fluencyScore||6), 0) / recent.length;
  const level = avg <= 4 ? 'elementary' : avg <= 6.5 ? 'intermediate' : avg <= 8.5 ? 'upper-intermediate' : 'advanced';
  // collect recent topics from originals
  const topics = recent.map(e => e.original).join(' ').slice(0, 400);
  const knownPhrases = [...knownExprs].slice(-10);
  return { avgScore: Math.round(avg*10)/10, level, topics, knownPhrases };
}

function renderExpressions() {
  const todayKey = getDateKey(new Date());
  const profile = computeLevelProfile();
  const levelLabel = { elementary:'초급+', intermediate:'중급', 'upper-intermediate':'중상급', advanced:'고급' }[profile.level] || '중급';
  const hasEntries = Object.values(entries).flat().length > 0;

  const headerHtml = `
    <div class="expr-header">
      <div class="expr-level-badge">📊 현재 레벨: ${levelLabel} (평균 ${profile.avgScore}/10)</div>
      <div class="expr-subtitle">오늘의 일기 내용과 실력을 분석해서<br>딱 한 단계 위의 표현을 추천해드려요.</div>
      <button class="expr-generate-btn" id="exprGenBtn" onclick="generateExpressions()">
        ${cachedExprs && cachedExprsDate === todayKey ? '🔄 다시 추천받기' : '✨ 오늘의 표현 추천받기'}
      </button>
    </div>`;

  if (cachedExprs && cachedExprsDate === todayKey) {
    document.getElementById('expressionsContent').innerHTML = headerHtml + renderExprCards(cachedExprs);
  } else {
    document.getElementById('expressionsContent').innerHTML = headerHtml + (hasEntries ? '' :
      '<div class="expr-empty">오늘의 일기를 먼저 써보세요.<br>쓴 내용을 바탕으로 딱 맞는 표현을 추천해줄게요 ✍️</div>');
  }
}

function renderExprCards(exprs) {
  return exprs.map((ex, i) => {
    const fid = `expr-fitb-${i}`;
    const isKnown = knownExprs.has(ex.phrase);
    const sentence = buildFITBSentence(ex.example, ex.phrase, fid);
    const hasBlank = sentence.includes('fitb-input');
    const isNews = ex.source === 'news';
    const sourceClass = isNews ? 'news' : 'topic';
    const sourceLabel = isNews ? '📰 뉴스 표현' : '🗣️ 주제 연관';

    // news outlink: Google News search
    const searchUrl = ex.newsSearchQuery
      ? `https://www.google.com/search?q=${encodeURIComponent(ex.newsSearchQuery)}&tbm=nws`
      : null;

    const newsLinkHtml = isNews && searchUrl ? `
      <a href="${searchUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);text-decoration:none;margin-top:6px;padding:4px 10px;border:1px solid var(--blue);border-radius:12px;width:fit-content;">
        🔗 ${escapeHtml(ex.newsSource||'관련 뉴스')} 에서 더 보기 ↗
      </a>` : '';

    return `
      <div class="expr-card" id="exprCard-${i}">
        <div class="expr-card-header">
          <span class="expr-source-badge ${sourceClass}">${sourceLabel}</span>
          <span class="expr-level-tag">${ex.levelTag || ''}</span>
        </div>
        <div class="expr-body">
          <div class="expr-phrase">${escapeHtml(ex.phrase)}</div>
          <div class="expr-meaning">${escapeHtml(ex.meaning)}</div>
          <div class="expr-example">"${escapeHtml(ex.example)}"</div>
          <div class="expr-context">${escapeHtml(ex.context)}</div>
          ${newsLinkHtml}
          ${hasBlank ? `
          <div class="expr-practice-zone">
            <div class="expr-practice-zone-label">✏️ 직접 써보기</div>
            <div class="fitb-sentence">${sentence}</div>
            <div class="fitb-actions">
              <button class="fitb-check-btn" onclick="checkFITB('${fid}','${escapeAttr(ex.phrase)}')">확인</button>
            </div>
            <div class="fitb-feedback" id="fb-${fid}"></div>
          </div>` : ''}
          <div class="expr-footer">
            <button class="expr-known-btn" style="border-color:var(--blue);color:var(--blue);" onclick="saveLearnedExpr(${i},'${escapeAttr(ex.phrase)}','${escapeAttr(ex.meaning)}')">
              📚 저장하기
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-5-20250929', max_tokens:1500,
        system:`You are an English expression coach for a Korean learner at ${profile.level} level (average fluency score ${profile.avgScore}/10).
Respond ONLY with a valid JSON array (no markdown, no backticks) of exactly 3 expression objects.

The learner's recent diary entries:
"""
${recentText || '(no entries yet)'}

Expressions the learner already knows (do NOT suggest these): ${knownList || 'none'}

Rules:

- "context" must be 2-3 sentences in Korean explaining: (1) what situation/emotion it expresses, (2) why it's more natural than common Korean-English mistakes, (3) any useful usage tip

Return exactly this structure:
[
  {

    "levelTag": "B2",

    "source": "news",
    "levelTag": "B2",
    "newsSource": "BBC News",
    "newsSearchQuery": "ramp up renewable energy BBC"
  }
]
source: "news" for exactly 1 item, "topic" for the other 2.
newsSource: outlet name for news item, null for topic items.
newsSearchQuery: 4-6 word search query that would find real articles using this phrase, null for topic items.`,
        messages:[{role:'user', content:'Generate 3 expressions now.'}]
      })
    });
    if(!res.ok) throw new Error(`서버 오류 (${res.status}) — 잠시 후 다시 시도해주세요`);

function saveLearnedExpr(index, phrase, meaning) {
  const ex = cachedExprs && cachedExprs[index];
  const example = ex ? ex.example : '';
  addToVocab(phrase, meaning, 'learned', example);
  const btn = event.target;
  btn.textContent = '✅ 저장됨';
  btn.style.background = 'var(--blue)';
  btn.style.color = 'white';
  btn.disabled = true;
}

function toggleKnown(index, phrase, meaning) {
  const ex = cachedExprs && cachedExprs[index];
  const resolvedMeaning = meaning || (ex && ex.meaning) || '';
  if (knownExprs.has(phrase)) {
    knownExprs.delete(phrase);
  } else {
    knownExprs.add(phrase);
    // Always save to vocab as 'known' — even if meaning is empty
    addToVocab(phrase, resolvedMeaning, 'known');
    updateStats();
  }
  localStorage.setItem('dailyEnglish_knownExprs', JSON.stringify([...knownExprs]));
  const btn = document.getElementById(`knownBtn-${index}`);
  if (btn) {
    const isKnown = knownExprs.has(phrase);
    btn.textContent = isKnown ? '✅ 이미 알고 있어요' : '이미 아는 표현이에요';
    btn.classList.toggle('marked', isKnown);
    if (isKnown) btn.insertAdjacentHTML('afterend','<div style="font-size:11px;color:var(--sage);margin-top:6px;text-align:right;">📚 내 사전에 저장됐어요. 다음 추천은 더 어려운 표현으로!</div>');
  }
}

    <div class="score-row"><span style="font-size:13px;color:var(--muted);">자연스러움</span><div class="score-dots">${dots}</div><span style="font-size:13px;color:var(--muted);margin-left:auto;">${e.fluencyScore}/10</span></div>
    <div style="margin-bottom:14px;"><div class="modal-label">📝 내가 쓴 표현</div><div style="font-family:'Lora',serif;font-size:15px;color:var(--muted);font-style:italic;line-height:1.65;">"${escapeHtml(e.original)}"</div></div>
    <div style="margin-bottom:14px;"><div class="modal-label">✨ 더 자연스러운 영어</div><div style="font-family:'Lora',serif;font-size:16px;color:var(--ink);font-weight:600;line-height:1.65;">"${escapeHtml(e.naturalVersion)}"</div></div>
    <div style="margin-bottom:14px;"><div class="modal-label">💡 핵심 표현</div>${phrasesHtml}</div>
    <div style="padding:12px 14px;background:var(--paper-warm);border-radius:8px;font-size:13px;line-height:1.6;">🌿 ${escapeHtml(e.encouragement)}</div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    entries:    JSON.parse(localStorage.getItem('dailyEnglish_entries')    || '{}'),
    vocab:      JSON.parse(localStorage.getItem('dailyEnglish_vocab')      || '[]'),
    knownExprs: JSON.parse(localStorage.getItem('dailyEnglish_knownExprs') || '[]'),
    mastered:   JSON.parse(localStorage.getItem('dailyEnglish_mastered')   || '[]'),
    settings:   JSON.parse(localStorage.getItem('dailyEnglish_settings')   || '{}'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `daily-english-${date}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.entries) throw new Error('올바른 백업 파일이 아니에요.');
      if (!confirm('현재 데이터를 백업 파일로 덮어씌울까요? 기존 데이터는 사라져요.')) return;
      if (data.entries)    localStorage.setItem('dailyEnglish_entries',    JSON.stringify(data.entries));
      if (data.vocab)      localStorage.setItem('dailyEnglish_vocab',      JSON.stringify(data.vocab));
      if (data.knownExprs) localStorage.setItem('dailyEnglish_knownExprs', JSON.stringify(data.knownExprs));
      if (data.mastered)   localStorage.setItem('dailyEnglish_mastered',   JSON.stringify(data.mastered));
      if (data.settings)   localStorage.setItem('dailyEnglish_settings',   JSON.stringify(data.settings));
      // Reload app state
      load(); updateStats(); renderTodayEntries();
      document.getElementById('importStatus').textContent = `✅ 복원 완료 (${data.exportedAt?.slice(0,10) || '날짜 불명'} 백업)`;
    } catch(err) {
      document.getElementById('importStatus').textContent = '❌ ' + err.message;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function openSettings() {
  document.getElementById('counselorToggle').checked = settings.counselor;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(e) {
  if (!e || e.target === document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').classList.remove('open');
}
function toggleCounselor(val) {
  settings.counselor = val;
  saveSettings();
  renderTodayEntries();
}

function closeModal(e){if(e.target.id==='modalOverlay') document.getElementById('modalOverlay').classList.remove('open');}

// ─── TABS ─────────────────────────────────────────────────
function switchTab(tab) {
  const names=['write','learn','record'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  // trigger default subtab content
  if(tab==='learn') {
    const active = document.querySelector('#tab-learn .subtab.active');
    const which = active ? active.textContent.trim() : '오늘의 추천';
    if(!active || which==='오늘의 추천' || which==='새 표현') renderExpressions();
    else if(which==='저장한 표현' || which==='내 사전') renderVocab();
  }
  if(tab==='record') {
    const active = document.querySelector('#tab-record .subtab.active');
    const which = active ? active.textContent.trim() : '지난 일기';
    if(which==='지난 일기'||!active) renderHistory();
    else renderGrowth();
  }
}

function switchSubtab(parent, sub) {
  const panel = document.getElementById('tab-'+parent);
  panel.querySelectorAll('.subtab').forEach((t,i)=>{
    const subs = parent==='learn' ? ['expressions','vocab'] : ['history','stats'];
    t.classList.toggle('active', subs[i]===sub);
  });
  panel.querySelectorAll('.subtab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('sub-'+sub).classList.add('active');
  if(sub==='expressions') renderExpressions();
  else if(sub==='vocab') renderVocab();
  else if(sub==='history') renderHistory();
  else if(sub==='stats') renderGrowth();
}

function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escapeAttr(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

init();
</script>
